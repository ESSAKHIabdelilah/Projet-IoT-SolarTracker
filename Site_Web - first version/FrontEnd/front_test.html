<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Solar Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #e6e6e6;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            border: 2px solid #ccc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
        }

        .header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        h2, h3 { margin-top: 0; color: #333; }
        .valeur { font-size: 2.5em; font-weight: bold; color: #0078D4; margin: 10px 0; }
        
        #messages {
            background: #f4f4f4;
            padding: 10px;
            font-family: monospace;
            font-size: 0.8em;
            height: 80px;
            overflow-y: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card header-card">
            <div>
                <h2>☀️ Solar Tracker Control Panel</h2>
                <p style="margin: 0; color: gray;">Supervision en temps réel</p>
                <br>
                <p style="margin: 0; color: gray;">Informations reçus : <span id="compteur" style="color: #000000;">0</span> </p>
            </div>

            <div id="status" style="font-weight: bold; color: orange;">Connexion en cours...</div>

        </div>
        <div class="grid-container">
            <div class="card">
                <h3>Lumière</h3>
                <div class="valeur" id="val-lux" style="font-weight: bold; color: orange;">-- lx</div>
            </div>
            
            <div class="card">
                <h3>Température</h3>
                <div class="valeur" id="val-temp" style="color: #D32F2F;">-- °C</div>
            </div>

            <div class="card">
                <h3>Humidité</h3>
                <div class="valeur" id="val-hum" style="color: #1976D2;">-- %</div>
            </div>

            <div class="card">
                <h3>Angles (Horizontal / Vertical)</h3>
                <div class="valeur" style="color: #388E3C;">
                    <span id="val-angh">--</span>° / <span id="val-angv">--</span>°
                </div>
            </div>

            <div class="card">
                <h3>Évolution Lumière</h3>
                <canvas id="luxChart"></canvas>
            </div>

            <div class="card">
                <h3>Évolution Température</h3>
                <canvas id="tempChart"></canvas>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h3>Flux de données brut</h3>
                <div id="messages">En attente de données...</div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION DES GRAPHIQUES ---
        const maxPoints = 15; // On garde 15 points maximum pour ne pas écraser le graphique

        // Fonction générique pour créer un joli graphique
        function creerGraphique(idCanvas, label, couleurLigne, couleurFond) {
            const ctx = document.getElementById(idCanvas).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [], // Les heures
                    datasets: [{
                        label: label,
                        data: [], // Les valeurs
                        borderColor: couleurLigne,
                        backgroundColor: couleurFond,
                        borderWidth: 2,
                        tension: 0.4, // Courbe adoucie
                        fill: true // Remplissage sous la courbe
                    }]
                },
                options: {
                    animation: false, // Pas d'animation pour fluidifier le temps réel
                    scales: { x: { display: false } } // On cache les heures sur l'axe X pour que ce soit plus propre
                }
            });
        }

        // Création des deux graphiques
        const chartLux = creerGraphique('luxChart', 'Lumière (lx)', '#E1AD01', 'rgba(225, 173, 1, 0.2)');
        const chartTemp = creerGraphique('tempChart', 'Température (°C)', '#D32F2F', 'rgba(211, 47, 47, 0.2)');


        // --- WEBSOCKET ET MISE À JOUR ---
        const ws = new WebSocket("ws://localhost:8000/ws");
        const messagesDiv = document.getElementById("messages");
        const statusDiv = document.getElementById("status");

        let totalMessages = 0;

        ws.onopen = () => {
            statusDiv.innerHTML = "✅ Connecté";
            statusDiv.style.color = "green";
        };

        ws.onmessage = (event) => {
            messagesDiv.innerHTML = `> ${event.data}<br>` + messagesDiv.innerHTML;

            totalMessages++;
            document.getElementById("compteur").innerText = totalMessages;

            try {
                const data = JSON.parse(event.data);
                const heureActuelle = new Date().toLocaleTimeString();

                // 1. Mise à jour des textes
                if (data.lux !== undefined) document.getElementById("val-lux").innerText = data.lux + " lx";
                if (data.temperature !== undefined) document.getElementById("val-temp").innerText = data.temperature + " °C";
                if (data.humidity !== undefined) document.getElementById("val-hum").innerText = data.humidity + " %";
                if (data.angle_h !== undefined) document.getElementById("val-angh").innerText = data.angle_h;
                if (data.angle_v !== undefined) document.getElementById("val-angv").innerText = data.angle_v;

                // 2. Mise à jour du Graphique de Lumière
                if (data.lux !== undefined) {
                    chartLux.data.labels.push(heureActuelle);
                    chartLux.data.datasets[0].data.push(data.lux);
                    if (chartLux.data.labels.length > maxPoints) {
                        chartLux.data.labels.shift();
                        chartLux.data.datasets[0].data.shift();
                    }
                    chartLux.update();
                }

                // 3. Mise à jour du Graphique de Température
                if (data.temperature !== undefined) {
                    chartTemp.data.labels.push(heureActuelle);
                    chartTemp.data.datasets[0].data.push(data.temperature);
                    if (chartTemp.data.labels.length > maxPoints) {
                        chartTemp.data.labels.shift();
                        chartTemp.data.datasets[0].data.shift();
                    }
                    chartTemp.update();
                }

            } catch (error) {
                console.error("Erreur JSON :", error);
            }
        };

        ws.onclose = () => {
            statusDiv.innerHTML = "❌ Déconnecté";
            statusDiv.style.color = "red";
        };
    </script>
</body>
</html>
